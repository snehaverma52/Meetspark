<!DOCTYPE html>
<html>
<head>
  <title>AI Meeting Minutes Generator</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { width: 420px; background: #fff; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0px 5px 20px rgba(0,0,0,.1); }
    button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; background: #007bff; color: white; font-weight: bold; margin-top: 10px; font-size: 15px; }
    button:disabled { background: gray; }
    .hidden { display: none; }
    .spinner { margin: 20px auto; width: 40px; height: 40px; border: 5px solid #ddd; border-top: 5px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .success { color: green; margin-top: 10px; }
    .error { color: red; margin-top: 10px; }
  </style>
</head>

<body>
<div class="box">
  <h2>Generate AI Meeting Minutes</h2>

  <input id="fileInput" type="file" accept="video/*" style="margin-top: 10px;">
  <button id="processBtn">Upload & Process</button>

  <div id="loader" class="spinner hidden"></div>
  <p id="message"></p>

  <button id="downloadSummary" class="hidden">Download Summary PDF</button>
  <button id="downloadTranscript" class="hidden">Download Transcript PDF</button>
</div>

<script>
const BASE_URL = window.location.origin;

const fileInput = document.getElementById("fileInput");
const processBtn = document.getElementById("processBtn");
const message = document.getElementById("message");
const loader = document.getElementById("loader");

const summaryBtn = document.getElementById("downloadSummary");
const transcriptBtn = document.getElementById("downloadTranscript");

let summaryURL = null;
let transcriptURL = null;

// Upload + process
processBtn.onclick = async () => {
  const file = fileInput.files[0];
  if (!file) return alert("Select a video first!");

  processBtn.disabled = true;
  loader.classList.remove("hidden");
  message.textContent = "Processing video... Please wait ⏳";

  const formData = new FormData();
  formData.append("file", file);

  const response = await fetch(`${BASE_URL}/upload`, { method: "POST", body: formData });
  const data = await response.json();

  loader.classList.add("hidden");
  processBtn.disabled = false;

  if (data.error) {
    message.innerHTML = `<span class="error">${data.error}</span>`;
    return;
  }

  summaryURL = `${BASE_URL}${data.summary_download_url}`;
  transcriptURL = `${BASE_URL}${data.transcript_download_url}`;

  summaryBtn.classList.remove("hidden");
  transcriptBtn.classList.remove("hidden");

  message.innerHTML = `<span class="success">Processing complete ✔️ Click buttons to download.</span>`;
};

// Manual download
summaryBtn.onclick = () => window.open(summaryURL, "_blank");
transcriptBtn.onclick = () => window.open(transcriptURL, "_blank");
</script>
</body>
</html>
